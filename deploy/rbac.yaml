apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-error-agent
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-error-agent
rules:
  # Read pods and their logs across all namespaces
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  # Read events for error context
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  # ConfigMap access for persistent deduplication state
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update"]
    resourceNames: ["k8s-error-agent-state"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-error-agent
subjects:
  - kind: ServiceAccount
    name: k8s-error-agent
    namespace: default
roleRef:
  kind: ClusterRole
  name: k8s-error-agent
  apiGroup: rbac.authorization.k8s.io
